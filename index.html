<!DOCTYPE html>
<html>
    <head>
        <title>Rock-Paper-scissors-Game</title>
    </head>
    <link rel="stylesheet" href="style.css" > 

    <body>
        <p class="h1"> Rock Paper Scissors</p>
        <button onclick="
        playGame('rock');
        " class="move-buttons"
        ><img src = "rock-emoji.png" class="game-img"></button>

        <button onclick="
        playGame('paper');
        " class="move-buttons"
        ><img src="paper-emoji.png" class="game-img"></button>

        <button onclick="
        playGame('scissors');
        " class="move-buttons"
        ><img src="scissors-emoji.png" class="game-img"></button>

        <p class="js-result result" ></p>
        <p class="js-moves"></p>
        <p class="js-score score"></p>

        <button onclick="
        score.wins = 0;
        score.losses = 0;
        score.ties = 0;
        localStorage.removeItem('score');
        updateScoreElement();
        " class="reset-button">Reset Button</button>

         <script src="script.js"></script>
    </body>
</html>
